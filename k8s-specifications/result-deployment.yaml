apiVersion: apps/v1
kind: Deployment
metadata:
  name: result
  namespace: voting-app
  labels:
    app: result
spec:
  replicas: 2   # ✅ better availability
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:

      # ✅ Wait for dependencies (CRITICAL)
      initContainers:
      - name: wait-for-db
        image: busybox
        command: ['sh', '-c', 'until nc -z db 5432; do echo waiting for db; sleep 5; done;']

      containers:
      - name: result
        image: dockersamples/examplevotingapp_result

        ports:
        - containerPort: 80

        # ✅ Resource limits
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        # ✅ Liveness probe
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10

        # ✅ Readiness probe
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5